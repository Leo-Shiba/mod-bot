<svg width="900" height="540" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0d2137"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#128C7E"/>
      <stop offset="100%" style="stop-color:#25D366"/>
    </linearGradient>
    <linearGradient id="step" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#075E54"/>
      <stop offset="100%" style="stop-color:#128C7E"/>
    </linearGradient>
  </defs>
  <rect width="900" height="540" fill="url(#bg)" rx="16"/>
  <rect width="900" height="72" fill="url(#hdr)" rx="16"/>
  <rect y="56" width="900" height="16" fill="url(#hdr)"/>
  <circle cx="46" cy="36" r="22" fill="rgba(255,255,255,0.15)"/>
  <text x="46" y="44" text-anchor="middle" font-size="22" fill="white">&#x1F4F1;</text>
  <text x="80" y="30" font-size="20" font-weight="700" fill="white">Mod-Bot &#x2014; Guia de Instalacao no Termux</text>
  <text x="80" y="52" font-size="13" fill="rgba(255,255,255,0.8)">Instale o bot direto no seu Android &#x2014; sem servidor, sem VPS</text>
  <rect x="20" y="88" width="36" height="36" fill="url(#hdr)" rx="8"/>
  <text x="38" y="112" text-anchor="middle" font-size="18" font-weight="800" fill="white">1</text>
  <rect x="66" y="88" width="814" height="36" fill="rgba(255,255,255,0.05)" rx="8"/>
  <text x="78" y="104" font-size="13" font-weight="700" fill="#25D366">Instalar o Termux</text>
  <text x="78" y="118" font-size="11.5" fill="#aaa">Acesse github.com/termux/termux-app/releases/latest - Baixe o .apk - Instale e abra</text>
  <text x="720" y="104" font-size="11" fill="#e74c3c" font-weight="600">NAO use a Play Store</text>
  <rect x="20" y="136" width="36" height="86" fill="url(#step)" rx="8"/>
  <text x="38" y="185" text-anchor="middle" font-size="18" font-weight="800" fill="white">2</text>
  <rect x="66" y="136" width="814" height="86" fill="rgba(255,255,255,0.05)" rx="8"/>
  <text x="78" y="152" font-size="13" font-weight="700" fill="#25D366">Configurar o Termux</text>
  <rect x="78" y="158" width="380" height="18" fill="rgba(0,0,0,0.3)" rx="4"/>
  <text x="86" y="171" font-size="11" fill="#7ec8e3" font-family="'Courier New', monospace">pkg update &amp;&amp; pkg upgrade -y</text>
  <text x="470" y="171" font-size="11" fill="#888">Atualiza os pacotes</text>
  <rect x="78" y="180" width="380" height="18" fill="rgba(0,0,0,0.3)" rx="4"/>
  <text x="86" y="193" font-size="11" fill="#7ec8e3" font-family="'Courier New', monospace">pkg install nodejs git -y</text>
  <text x="470" y="193" font-size="11" fill="#888">Instala Node.js e Git</text>
  <rect x="78" y="200" width="380" height="18" fill="rgba(0,0,0,0.3)" rx="4"/>
  <text x="86" y="213" font-size="11" fill="#7ec8e3" font-family="'Courier New', monospace">node -v &amp;&amp; git --version</text>
  <text x="470" y="213" font-size="11" fill="#888">Confirma instalacao</text>
  <rect x="20" y="234" width="36" height="50" fill="url(#hdr)" rx="8"/>
  <text x="38" y="265" text-anchor="middle" font-size="18" font-weight="800" fill="white">3</text>
  <rect x="66" y="234" width="814" height="50" fill="rgba(255,255,255,0.05)" rx="8"/>
  <text x="78" y="250" font-size="13" font-weight="700" fill="#25D366">Clonar o repositorio</text>
  <rect x="78" y="256" width="580" height="20" fill="rgba(0,0,0,0.3)" rx="4"/>
  <text x="86" y="270" font-size="11.5" fill="#7ec8e3" font-family="'Courier New', monospace">git clone https://github.com/Leo-Shiba/mod-bot.git &amp;&amp; cd mod-bot</text>
  <rect x="20" y="296" width="36" height="50" fill="url(#step)" rx="8"/>
  <text x="38" y="327" text-anchor="middle" font-size="18" font-weight="800" fill="white">4</text>
  <rect x="66" y="296" width="814" height="50" fill="rgba(255,255,255,0.05)" rx="8"/>
  <text x="78" y="312" font-size="13" font-weight="700" fill="#25D366">Instalar dependencias</text>
  <rect x="78" y="318" width="200" height="20" fill="rgba(0,0,0,0.3)" rx="4"/>
  <text x="86" y="332" font-size="11.5" fill="#7ec8e3" font-family="'Courier New', monospace">npm install</text>
  <text x="290" y="332" font-size="11" fill="#888">Pode demorar alguns minutos na primeira vez</text>
  <rect x="20" y="358" width="36" height="66" fill="url(#hdr)" rx="8"/>
  <text x="38" y="397" text-anchor="middle" font-size="18" font-weight="800" fill="white">5</text>
  <rect x="66" y="358" width="814" height="66" fill="rgba(37,211,102,0.08)" rx="8" stroke="#25D366" stroke-width="1"/>
  <text x="78" y="374" font-size="13" font-weight="700" fill="#25D366">Iniciar o bot e escanear QR Code</text>
  <rect x="78" y="380" width="160" height="20" fill="rgba(0,0,0,0.3)" rx="4"/>
  <text x="86" y="394" font-size="11.5" fill="#7ec8e3" font-family="'Courier New', monospace">npm start</text>
  <text x="250" y="394" font-size="11" fill="#888">Um QR Code aparecera no terminal</text>
  <text x="78" y="416" font-size="11.5" fill="#ccc">WhatsApp - Configuracoes - Aparelhos conectados - Conectar aparelho</text>
  <rect x="20" y="436" width="36" height="50" fill="url(#step)" rx="8"/>
  <text x="38" y="467" text-anchor="middle" font-size="18" font-weight="800" fill="white">6</text>
  <rect x="66" y="436" width="814" height="50" fill="rgba(255,255,255,0.05)" rx="8"/>
  <text x="78" y="452" font-size="13" font-weight="700" fill="#25D366">Manter rodando (opcional mas recomendado)</text>
  <rect x="78" y="458" width="230" height="20" fill="rgba(0,0,0,0.3)" rx="4"/>
  <text x="86" y="472" font-size="11.5" fill="#7ec8e3" font-family="'Courier New', monospace">termux-wake-lock</text>
  <text x="320" y="472" font-size="11" fill="#888">Evita o sistema encerrar o Termux</text>
  <rect y="498" width="900" height="42" fill="url(#hdr)" rx="0"/>
  <rect y="498" width="900" height="8" fill="url(#hdr)"/>
  <text x="450" y="523" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.9)">Quando aparecer Conectado ao WhatsApp! o bot esta pronto! Para reiniciar: cd mod-bot &amp;&amp; npm start</text>
</svg>
